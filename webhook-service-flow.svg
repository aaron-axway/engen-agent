<line x1="1126" y1="705" x2="394" y2="705" stroke="#ea580c" stroke-width="1.8" marker-end="url(#arrow-cb)"/>
<rect x="667" y="685" width="187" height="16" fill="#ffffff" opacity="0.96"/>
<text x="760" y="697" text-anchor="middle" font-size="12" font-weight="600" fill="#ea580c">POST /webhooks/servicenow</text>
