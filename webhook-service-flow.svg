<line x1="50" y1="966" x2="76" y2="966" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arrow-ax)"/>
<text x="84" y="970" font-size="11" fill="#111827">Axway forward + enrich + auto-approve</text>
<line x1="352" y1="966" x2="378" y2="966" stroke="#9333ea" stroke-width="1.8" marker-end="url(#arrow-hm)"/>
<text x="386" y="970" font-size="11" fill="#111827">Highmark OAuth + SNow catalog submit</text>
<line x1="648" y1="966" x2="674" y2="966" stroke="#16a34a" stroke-width="1.8" marker-end="url(#arrow-db)"/>
<text x="682" y="970" font-size="11" fill="#111827">H2 database write / lookup</text>
<line x1="884" y1="966" x2="910" y2="966" stroke="#ea580c" stroke-width="1.8" marker-end="url(#arrow-cb)"/>
<text x="918" y="970" font-size="11" fill="#111827">ServiceNow callback + Axway propagation</text>
