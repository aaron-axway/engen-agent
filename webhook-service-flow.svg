<rect x="467" y="560" width="96" height="16" fill="#ffffff" opacity="0.96"/>
<text x="515" y="572" text-anchor="middle" font-size="12" font-weight="600" fill="#16a34a">update event</text>
<rect x="422" y="584" width="186" height="14" fill="#ffffff" opacity="0.96"/>
<text x="515" y="595" text-anchor="middle" font-size="10" fill="#6b7280">status = PROCESSED · ticketId</text>
<line x1="40" y1="630" x2="1200" y2="630" stroke="#d1d5db" stroke-width="1" stroke-dasharray="3,3"/>
<rect x="440" y="619" width="360" height="22" rx="11" fill="#fff7ed" stroke="#fed7aa" stroke-width="1"/>
