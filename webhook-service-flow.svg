<rect x="443" y="905" width="145" height="16" fill="#ffffff" opacity="0.96"/>
<text x="515" y="917" text-anchor="middle" font-size="12" font-weight="600" fill="#16a34a">set callback_status</text>
<rect x="434" y="929" width="162" height="14" fill="#ffffff" opacity="0.96"/>
<text x="515" y="940" text-anchor="middle" font-size="10" fill="#6b7280">SUCCESS | FAILED_API_CALL</text>
