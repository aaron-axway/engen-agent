<text x="515" y="775" text-anchor="middle" font-size="10" fill="#6b7280">find original Axway event</text>
<line x1="394" y1="815" x2="636" y2="815" stroke="#16a34a" stroke-width="1.8" marker-end="url(#arrow-db)"/>
<rect x="446" y="795" width="138" height="16" fill="#ffffff" opacity="0.96"/>
